name = "nuxt-pwa-carins"
account_id = "24b45709d060d957340180e995f0d373"
#pages_build_output_dir="./dist"

compatibility_date = "2024-09-19"
compatibility_flags = ["nodejs_compat"]
main = "./.output/server/index.mjs"
assets = { directory = "./.output/public/", binding = "ASSETS" }

# auth-worker POST /auth/introspect (#290 Phase 4) を叩くための共有 secret。
# /api/proxy/* と /api/recieve の forward 前段で browser JWT を署名検証 +
# APP_TENANT_ACL 判定するために使う (defense-in-depth)。auth-worker / cc-relay /
# ref-files と同じ CF Secrets Store entry を物理共有。GCP cloudsql-sv に同名
# secret が SoT として存在し frontend-ci の secret-verify が検証する
# (test.yml で gcp_secret_verify_* 配線)。
[[secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

# device-token 経路 (/api/device-upload, Phase 2 / smb-watch#1) の introspect を
# 公開 HTTP ではなく CF service binding (worker-to-worker, 内部) で叩く。
[[services]]
binding = "AUTH_WORKER"
service = "auth-worker"

[build]
command = "npm run build"

[observability]
enabled = true
head_sampling_rate = 1

[[routes]]
pattern = "carins.ippoan.org"
custom_domain = true

[vars]
NUXT_PUBLIC_API_BACKEND = "rust-alc-api"
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth.ippoan.org"
NUXT_ALC_API_URL = "https://rust-alc-api-747065218280.asia-northeast1.run.app"

[env.preview]
[env.preview.vars]
NUXT_PUBLIC_API_BACKEND = "rust-alc-api"
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth.ippoan.org"
NUXT_ALC_API_URL = "https://rust-alc-api-747065218280.asia-northeast1.run.app"

# named env は top-level binding を継承しないので再宣言する。
[[env.preview.secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

[[env.preview.services]]
binding = "AUTH_WORKER"
service = "auth-worker"

[env.staging]
name = "nuxt-pwa-carins-staging"

[[env.staging.routes]]
pattern = "carins-staging.ippoan.org"
custom_domain = true

[env.staging.vars]
NUXT_PUBLIC_API_BACKEND = "rust-alc-api"
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth-staging.ippoan.org"
NUXT_ALC_API_URL = "https://rust-alc-api-staging-566bls5vfq-an.a.run.app"

# staging/prod 統合 entry なので同じ secret_name (auth-worker #189)。
[[env.staging.secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

[[env.staging.services]]
binding = "AUTH_WORKER"
service = "auth-worker-staging"
