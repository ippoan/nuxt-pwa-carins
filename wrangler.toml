name = "nuxt-pwa-carins"
#pages_build_output_dir="./dist"

compatibility_date = "2024-09-19"
compatibility_flags = ["nodejs_compat"]
main = "./.output/server/index.mjs"
assets = { directory = "./.output/public/", binding = "ASSETS" }

[observability]
enabled = true
head_sampling_rate = 1

# Service Binding: cf-grpc-proxyのDurable Objectに接続
[[services]]
binding = "GRPC_PROXY_SERVICE"
service = "cf-grpc-proxy"

[vars]
NUXT_PUBLIC_API_BACKEND = "rust-logi"
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth.mtamaramu.com"

[[routes]]
pattern = "nuxt-pwa-carins.mtamaramu.com"
custom_domain = true

[env.preview]
# preview環境: rust-logi検証用
[[env.preview.services]]
binding = "GRPC_PROXY_SERVICE"
service = "cf-grpc-proxy"

[env.preview.vars]
NUXT_PUBLIC_API_BACKEND = "rust-logi"
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth.mtamaramu.com"