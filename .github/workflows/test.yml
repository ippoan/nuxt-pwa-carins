name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: read
  pull-requests: write
  id-token: write   # frontend-ci.yml 内蔵の secret-verify job が要求 (未宣言だと
                    # gcp_secret_verify_* を渡さない caller でも startup_failure)

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      install_command: 'npm install'
      use_auth_client_dev: true
      # #290 Phase 4: wrangler.toml に INTERNAL_SHARED_SECRET の
      # secrets_store_secrets binding を追加したので secret-verify が必須化する。
      # GCP cloudsql-sv の同名 secret を WIF で検証 (ippoan org vars / secrets: inherit)。
      gcp_secret_verify_project: ${{ vars.GCP_PROJECT_ID_STAGING }}
      gcp_secret_verify_provider: ${{ vars.GCP_WIF_PROVIDER }}
      gcp_secret_verify_sa: ${{ vars.GCP_WIF_SERVICE_ACCOUNT_STAGING }}
      # Release Wave の frontend↔backend compatibility edge を記録する。
      # integration test を rust-alc-api コンテナ (docker-compose.test.yml の api
      # サービス) 相手に回し、その image SHA を compat report として ci-dashboard に送る。
      # compat machinery が test 前に backend SHA を解決し
      # API_IMAGE=ghcr.io/ippoan/rust-alc-api:<sha> を export → その image で integration を回す。
      has_integration: true
      compat_backend_repo: 'ippoan/rust-alc-api'
      compat_backend_image_env: 'API_IMAGE'
      integration_test_command: 'npx vitest run tests/integration/'
      integration_env: 'API_BASE_URL=http://localhost:18080'
      cache_dependency_path: package-lock.json
      # draft PR でも staging に deploy する (local-claude / Claude in Chrome での
      # 実機検証を draft のまま回すため。既定は draft==false gate で未 deploy)。
      deploy_staging_on_draft: true
      deploy_staging_script: |
        NITRO_PRESET=cloudflare_module \
        NUXT_PUBLIC_AUTH_WORKER_URL=${{ vars.STAGING_AUTH_WORKER_URL }} \
        NUXT_PUBLIC_API_BACKEND=${{ vars.STAGING_API_BACKEND }} \
        NUXT_ALC_API_URL=${{ vars.STAGING_ALC_API_URL }} \
        NUXT_PUBLIC_APP_VERSION=${{ github.sha }} \
        npm run build
        npx wrangler deploy --env staging --var NUXT_PUBLIC_APP_VERSION:${{ github.sha }}
      deploy_release_script: |
        NITRO_PRESET=cloudflare_module \
        NUXT_PUBLIC_AUTH_WORKER_URL=${{ vars.RELEASE_AUTH_WORKER_URL }} \
        NUXT_PUBLIC_API_BACKEND=${{ vars.RELEASE_API_BACKEND }} \
        NUXT_ALC_API_URL=${{ vars.RELEASE_ALC_API_URL }} \
        NUXT_PUBLIC_APP_VERSION=${{ github.ref_name }} \
        npm run build
        npx wrangler deploy --var NUXT_PUBLIC_APP_VERSION:${{ github.ref_name }}
    secrets: inherit
