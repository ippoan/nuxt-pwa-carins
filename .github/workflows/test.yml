name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      install_command: 'npm install'
      use_auth_client_dev: true
      deploy_on_tag: true
      deploy_staging_script: |
        NITRO_PRESET=cloudflare_module \
        NUXT_PUBLIC_AUTH_WORKER_URL=${{ vars.STAGING_AUTH_WORKER_URL }} \
        NUXT_PUBLIC_API_BACKEND=${{ vars.STAGING_API_BACKEND }} \
        NUXT_ALC_API_URL=${{ vars.STAGING_ALC_API_URL }} \
        NUXT_PUBLIC_APP_VERSION=${{ github.sha }} \
        npm run build
        npx wrangler deploy --env staging --var NUXT_PUBLIC_APP_VERSION:${{ github.sha }}
      deploy_release_script: |
        NITRO_PRESET=cloudflare_module \
        NUXT_PUBLIC_AUTH_WORKER_URL=${{ vars.RELEASE_AUTH_WORKER_URL }} \
        NUXT_PUBLIC_API_BACKEND=${{ vars.RELEASE_API_BACKEND }} \
        NUXT_ALC_API_URL=${{ vars.RELEASE_ALC_API_URL }} \
        NUXT_PUBLIC_APP_VERSION=${{ github.ref_name }} \
        npm run build
        npx wrangler deploy --var NUXT_PUBLIC_APP_VERSION:${{ github.ref_name }}
    secrets: inherit
