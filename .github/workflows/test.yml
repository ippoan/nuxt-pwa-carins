name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  test:
    name: Vitest + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npx nuxt prepare

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=default --reporter=json --outputFile.json=coverage/test-results.json

      - name: Job Summary
        if: always()
        run: |
          echo "## Vitest Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f coverage/test-results.json ]; then
            node -e "
              const s = require('./coverage/test-results.json');
              const suites = s.numTotalTestSuites || 0;
              const passed = s.numPassedTestSuites || 0;
              const tests = s.numTotalTests || 0;
              const testsPassed = s.numPassedTests || 0;
              const failed = s.numFailedTests || 0;
              console.log('### Summary');
              console.log('- Test Files: ' + (failed === 0 ? '✅' : '❌') + ' ' + passed + ' passes · ' + suites + ' total');
              console.log('- Test Results: ' + (failed === 0 ? '✅' : '❌') + ' ' + testsPassed + ' passes · ' + tests + ' total');
              if (failed > 0) console.log('- ❌ ' + failed + ' failed');
            " >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f coverage/coverage-summary.json ]; then
            echo "### Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Category | Stmts | Branch | Funcs | Lines |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|--------|-------|-------|" >> $GITHUB_STEP_SUMMARY
            node -e "
              const s = require('./coverage/coverage-summary.json');
              const t = s.total;
              console.log('| **Total** | ' + t.statements.pct + '% | ' + t.branches.pct + '% | ' + t.functions.pct + '% | ' + t.lines.pct + '% |');
            " >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY

            node -e "
              const s = require('./coverage/coverage-summary.json');
              const files = Object.keys(s).filter(k => k !== 'total');
              const full = files.filter(k => s[k].lines.pct === 100);
              console.log('**Lines 100%:** ' + full.length + ' / ' + files.length + ' files');
            " >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY

            echo '<details><summary>Lines &lt; 100% ファイル一覧</summary>' >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '| File | Stmts | Branch | Funcs | Lines |' >> $GITHUB_STEP_SUMMARY
            echo '|------|-------|--------|-------|-------|' >> $GITHUB_STEP_SUMMARY
            node -e "
              const path = require('path');
              const s = require('./coverage/coverage-summary.json');
              const cwd = process.cwd();
              Object.keys(s).filter(k => k !== 'total').forEach(k => {
                const e = s[k];
                if (e.lines.pct < 100) {
                  const rel = path.relative(cwd, k);
                  console.log('| ' + rel + ' | ' + e.statements.pct + '% | ' + e.branches.pct + '% | ' + e.functions.pct + '% | ' + e.lines.pct + '% |');
                }
              });
            " >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '</details>' >> $GITHUB_STEP_SUMMARY
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npx nuxi typecheck

  deploy-staging:
    name: Deploy Staging
    if: github.event_name == 'pull_request'
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: NITRO_PRESET=cloudflare_module npm run build
        env:
          NUXT_PUBLIC_AUTH_WORKER_URL: ${{ vars.STAGING_AUTH_WORKER_URL }}
          NUXT_PUBLIC_API_BACKEND: ${{ vars.STAGING_API_BACKEND }}
          NUXT_ALC_API_URL: ${{ vars.STAGING_ALC_API_URL }}

      - name: Deploy to Cloudflare Workers (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy --env staging

  deploy-release:
    name: Deploy Release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: NITRO_PRESET=cloudflare_module npm run build
        env:
          NUXT_PUBLIC_AUTH_WORKER_URL: ${{ vars.RELEASE_AUTH_WORKER_URL }}
          NUXT_PUBLIC_API_BACKEND: ${{ vars.RELEASE_API_BACKEND }}
          NUXT_ALC_API_URL: ${{ vars.RELEASE_ALC_API_URL }}

      - name: Deploy to Cloudflare Workers (release)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
